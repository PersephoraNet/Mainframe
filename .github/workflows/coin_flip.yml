name: 🪙 Coin Flip

on:
  schedule:
    - cron: "0 9 * * *"   # Every day at 9:00 AM UTC
  workflow_dispatch:
    inputs:
      session_id:
        description: "Session ID (leave blank to auto-generate from run ID)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  flip:
    name: Flip the Coin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve Session ID
        run: |
          if [ -n "${{ github.event.inputs.session_id }}" ]; then
            echo "SESSION_ID=${{ github.event.inputs.session_id }}" >> $GITHUB_ENV
          else
            echo "SESSION_ID=run-${{ github.run_id }}-attempt-${{ github.run_attempt }}" >> $GITHUB_ENV
          fi

      - name: Flip the Coin
        id: coin
        run: SESSION_ID=${{ env.SESSION_ID }} python coin_flip.py

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flip_history.json
          git diff --staged --quiet || git commit -m "chore: record flip result [skip ci]"
          git push

      - name: Write Job Summary
        run: |
          echo "## 🪙 Coin Flip Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Session ID | \`${{ env.SESSION_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Session Words | \`${{ steps.coin.outputs.session_words }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Result** | **${{ steps.coin.outputs.result }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| FACE count | ${{ steps.coin.outputs.face_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TAIL count | ${{ steps.coin.outputs.tail_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total flips | ${{ steps.coin.outputs.total_flips }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flip Hash | \`${{ steps.coin.outputs.flip_hash }}\` |" >> $GITHUB_STEP_SUMMARY
